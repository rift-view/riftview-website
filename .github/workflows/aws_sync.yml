name: Deploy to S3 + CloudFront

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  S3_BUCKET: riftview-website
  CLOUDFRONT_DISTRIBUTION_ID: E380EYD8TNBL8P
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::279867550171:role/riftview-website-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed/static assets to S3 (long cache)
        run: |
          aws s3 sync . s3://${S3_BUCKET} \
            --delete \
            --exclude "*" \
            --include "assets/*" \
            --include "scripts/*" \
            --include "styles/*" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML and root files to S3 (short cache)
        run: |
          aws s3 sync . s3://${S3_BUCKET} \
            --exclude "*" \
            --exclude ".*" \
            --exclude ".*/*" \
            --exclude "_screenshots/*" \
            --exclude "scripts/*" \
            --exclude "styles/*" \
            --exclude "assets/*" \
            --include "*.html" \
            --include "*.txt" \
            --include "*.xml" \
            --include "*.ico" \
            --include "*.webmanifest" \
            --include "*.png" \
            --include "*.svg" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} \
            --paths "/*"
